name: 🔥 Monster Ticket Scraper

on:
  schedule:
    # Run every 2 minutes (GitHub minimum practical interval)
    - cron: '*/2 * * * *'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ticket-scraper
  cancel-in-progress: false

jobs:
  monster-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ticket-bot
        run: npm install puppeteer

      - name: 🔥 Run Monster Scraper
        working-directory: ticket-bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TARGET_DATES: '2026-03-28,2026-03-29,2026-04-04,2026-04-05'
        run: node scraper-action.js
