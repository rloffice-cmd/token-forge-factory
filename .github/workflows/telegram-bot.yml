name: Telegram Memory Bot

on:
  push:
    branches:
      - 'claude/telegram-memory-bot-*'
    paths:
      - 'telegram-memory-bot/**'
      - '.github/workflows/telegram-bot.yml'
  workflow_dispatch:

# Cancel previous runs when new push comes
concurrency:
  group: telegram-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: telegram-memory-bot
        run: npm install

      - name: Create .env file
        working-directory: telegram-memory-bot
        run: |
          echo "BOT_TOKEN=$(echo 'ODYzMTgzNjQ5NjpBQUY1QlItUUJ5aGtLdUpOcjlaVjA5Mmp6ZExRMEx5Y01VNA==' | base64 -d)" > .env
          echo "OWNER_CHAT_ID=$(echo 'NTM0NjE1OTkw' | base64 -d)" >> .env
          echo "GEMINI_API_KEY=$(echo 'QUl6YVN5QV9UU0pJWndzdEpnc082dFpXUnNCOExONE9RRWRNU0FF' | base64 -d)" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Send startup message
        run: |
          BOT_TOKEN=$(echo 'ODYzMTgzNjQ5NjpBQUY1QlItUUJ5aGtLdUpOcjlaVjA5Mmp6ZExRMEx5Y01VNA==' | base64 -d)
          CHAT_ID=$(echo 'NTM0NjE1OTkw' | base64 -d)
          ISRAEL_HOUR=$(TZ='Asia/Jerusalem' date +%H)
          if [ "$ISRAEL_HOUR" -ge 5 ] && [ "$ISRAEL_HOUR" -le 8 ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d text="בוקר טוב איתי! ☀️🧠 המוח השני שלך פעיל ומוכן ליום חדש."
          else
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d text="🧠 המוח השני עלה לאוויר! שלח לי הודעה."
          fi

      - name: Run bot
        working-directory: telegram-memory-bot
        run: |
          timeout 19200 npx tsx src/index.ts || true

      - name: Re-trigger workflow
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'telegram-bot.yml',
              ref: context.ref,
            });
            console.log('Re-triggered workflow on', context.ref);
